<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ টিভি - প্রো প্লেয়ার</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; }
        .player-wrapper { width: 100%; max-width: 850px; margin: auto; background: #000; position: sticky; top: 0; z-index: 100; }
        video { width: 100%; aspect-ratio: 16/9; display: block; background: #111; }
        
        /* ডিজাইন আগের মতোই থাকবে */
        .section-title { padding: 10px 15px; background: #111; font-weight: bold; color: #38bdf8; border-bottom: 1px solid #222; }
        .event-wrapper { display: flex; overflow-x: auto; padding: 15px; background: #050505; }
        .event-card { min-width: 180px; height: 110px; background: #1e293b; margin-right: 15px; border-radius: 10px; position: relative; cursor: pointer; background-size: cover; background-position: center; border: 1px solid #333; }
        .event-card span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 5px; font-size: 11px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; padding: 10px; }
        .ch-item { width: 30%; max-width: 110px; margin: 1.5%; text-align: center; cursor: pointer; }
        .ch-img { width: 80px; height: 80px; background: #111; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="section-title">সরাসরি ইভেন্ট</div>
<div id="eventBox" class="event-wrapper"></div>

<div class="grid" id="mainBox"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const video = document.getElementById('video');
    const S_URL = 'https://loaobuffipniwswylxyd.supabase.co';
    const S_KEY = 'sb_publishable_Y3LZPx7OkeJfztuTq4XkOg_WGDnvKlc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let hls = new Hls();

    function playNow(url) {
        // CORS Proxy যোগ করা (যদি সরাসরি লিঙ্ক না চলে)
        // অনেক সময় 'https://cors-anywhere.herokuapp.com/' ব্যবহার করা হয়, তবে এর নিজস্ব লিমিট আছে।
        const finalUrl = url; 

        if (Hls.isSupported()) {
            hls.destroy(); // আগের স্ট্রিম বন্ধ করা
            hls = new Hls();
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
            
            // এরর হ্যান্ডেলিং
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.log("Fatal error, trying to recover...");
                    hls.recoverMediaError();
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = finalUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function init() {
        const { data } = await _supabase.from('strm_vault_data').select('*');
        const eBox = document.getElementById('eventBox');
        const mBox = document.getElementById('mainBox');
        
        data.forEach(item => {
            const card = document.createElement('div');
            if(item.sv_is_event) {
                card.className = 'event-card';
                card.style.backgroundImage = `url('${item.sv_logo}')`;
                card.innerHTML = `<span>${item.sv_title}</span>`;
                card.onclick = () => playNow(item.sv_link);
                eBox.appendChild(card);
            } else {
                const ch = document.createElement('div');
                ch.className = 'ch-item';
                ch.innerHTML = `<img src="${item.sv_logo}" class="ch-img"><div>${item.sv_title}</div>`;
                ch.onclick = () => playNow(item.sv_link);
                mBox.appendChild(ch);
            }
        });
    }

    init();
</script>
</body>
</html>
