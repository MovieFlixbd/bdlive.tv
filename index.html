<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ টিভি - ফাইনাল ফিক্স</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.2.9/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer@1.27.0/dist/DPlayer.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 50px; }
        .player-container { width: 100%; max-width: 900px; margin: auto; position: sticky; top: 0; z-index: 1000; background: #000; }
        #dplayer { width: 100%; aspect-ratio: 16/9; background: #111; }
        .dplayer-video { object-fit: fill !important; }

        .section-title { padding: 12px; background: #111; font-weight: bold; color: #38bdf8; border-bottom: 1px solid #222; font-size: 14px; }
        .cat-bar { display: flex; overflow-x: auto; padding: 10px 15px; background: #0a0a0a; border-bottom: 1px solid #222; gap: 8px; }
        .cat-item { padding: 6px 16px; background: #1e293b; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 12px; border: 1px solid #334155; }
        .cat-item.active { background: #3b82f6; border-color: #38bdf8; }

        .event-wrapper { display: flex; overflow-x: auto; padding: 15px; background: #050505; gap: 15px; }
        .event-card { min-width: 160px; height: 100px; background: #1e293b; border-radius: 8px; position: relative; cursor: pointer; background-size: cover; background-position: center; border: 1px solid #333; flex-shrink: 0; }
        .event-card span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 5px; font-size: 10px; text-align: center; border-radius: 0 0 8px 8px; }

        .grid { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; justify-content: flex-start; }
        .ch-item { width: 30%; max-width: 90px; text-align: center; cursor: pointer; margin-bottom: 5px; }
        .ch-img { width: 65px; height: 65px; background: #111; border-radius: 12px; object-fit: cover; border: 1px solid #222; }
        .ch-txt { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .cat-bar::-webkit-scrollbar, .event-wrapper::-webkit-scrollbar { display: none; }
        #status-msg { text-align: center; padding: 10px; font-size: 12px; color: #38bdf8; }
    </style>
</head>
<body>

<div class="player-container">
    <div id="dplayer"></div>
</div>

<div id="status-msg">চ্যানেল লোড হচ্ছে...</div>

<div class="section-title">ক্যাটাগরি</div>
<div id="catBar" class="cat-bar"></div>

<div class="section-title">লাইভ ইভেন্ট</div>
<div id="eventBox" class="event-wrapper"></div>

<div class="section-title">সব চ্যানেল</div>
<div id="mainBox" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const S_URL = 'https://loaobuffipniwswylxyd.supabase.co';
    const S_KEY = 'sb_publishable_Y3LZPx7OkeJfztuTq4XkOg_WGDnvKlc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let dp;
    let masterData = [];

    // স্মার্ট প্লেয়ার লজিক
    function initPlayer(url, retryCount = 0) {
        if (dp) dp.destroy();
        
        let finalUrl = url;
        
        // রিট্রাই লজিক অনুযায়ী প্রক্সি পরিবর্তন
        if (retryCount === 1) {
            finalUrl = "https://corsproxy.io/?" + encodeURIComponent(url);
            console.log("Trying Proxy 1...");
        } else if (retryCount === 2) {
            finalUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
            console.log("Trying Proxy 2...");
        }

        dp = new DPlayer({
            container: document.getElementById('dplayer'),
            live: true,
            autoplay: true,
            video: {
                url: finalUrl,
                type: 'hls'
            }
        });

        // এরর আসলে পরবর্তী প্রক্সি ট্রাই করবে
        dp.on('error', function() {
            if (retryCount < 2) {
                initPlayer(url, retryCount + 1);
            } else {
                document.getElementById('status-msg').innerText = "দুঃখিত! এই লিঙ্কটি আপনার ডিভাইসে সাপোর্ট করছে না।";
                document.getElementById('status-msg').style.color = "red";
            }
        });

        dp.on('fullscreen', function() {
            setTimeout(() => {
                const video = document.querySelector('.dplayer-video');
                if (video) video.style.objectFit = 'fill';
            }, 100);
        });
    }

    async function loadData() {
        try {
            const { data, error } = await _supabase.from('strm_vault_data').select('*');
            if (error) throw error;

            masterData = data || [];
            if (masterData.length > 0) {
                document.getElementById('status-msg').style.display = 'none';
                renderUI(masterData);
                renderCategories(masterData);
                initPlayer(masterData[0].sv_link);
            } else {
                document.getElementById('status-msg').innerText = "কোনো চ্যানেল পাওয়া যায়নি!";
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Error: " + e.message;
        }
    }

    function renderUI(data) {
        const eBox = document.getElementById('eventBox');
        const mBox = document.getElementById('mainBox');
        eBox.innerHTML = ''; mBox.innerHTML = '';

        data.forEach(item => {
            const isEvent = item.sv_is_event === true || item.sv_is_event === 'true';
            
            if(isEvent) {
                const e = document.createElement('div');
                e.className = 'event-card';
                e.style.backgroundImage = "url('" + (item.sv_logo || 'https://via.placeholder.com/200x120?text=Live') + "')";
                e.innerHTML = "<span>" + item.sv_title + "</span>";
                e.onclick = () => { initPlayer(item.sv_link); window.scrollTo(0,0); };
                eBox.appendChild(e);
            }

            const c = document.createElement('div');
            c.className = 'ch-item';
            c.innerHTML = '<img src="' + (item.sv_logo || 'https://via.placeholder.com/80') + '" class="ch-img"><div class="ch-txt">' + item.sv_title + '</div>';
            c.onclick = () => { initPlayer(item.sv_link); window.scrollTo(0,0); };
            mBox.appendChild(c);
        });
    }

    function renderCategories(data) {
        const bar = document.getElementById('catBar');
        const cats = ['All', ...new Set(data.map(i => i.sv_category).filter(c => c))];
        bar.innerHTML = '';
        cats.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'cat-item' + (cat === 'All' ? ' active' : '');
            div.innerText = cat;
            div.onclick = function() {
                document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                const filtered = (cat === 'All') ? masterData : masterData.filter(i => i.sv_category === cat);
                renderUI(filtered);
            };
            bar.appendChild(div);
        });
    }

    loadData();
</script>
</body>
</html>
