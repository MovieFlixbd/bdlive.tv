<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লাইভ টিভি নেটওয়ার্ক</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 0; }
        .player-box { width: 100%; max-width: 900px; margin: auto; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #38bdf8; }
        video { width: 100%; aspect-ratio: 16/9; background: #111; display: block; }
        
        .section-title { padding: 12px; background: #111; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .event-wrapper { display: flex; overflow-x: auto; padding: 15px; background: #050505; }
        .event-card { min-width: 180px; height: 110px; background: #1e293b; margin-right: 15px; border-radius: 10px; position: relative; cursor: pointer; background-size: cover; background-position: center; border: 1px solid #333; flex-shrink: 0; }
        .event-card span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 5px; font-size: 11px; text-align: center; border-radius: 0 0 10px 10px; box-sizing: border-box; }

        .controls { padding: 15px; }
        #search { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        .cat-bar { display: flex; overflow-x: auto; padding-bottom: 10px; }
        .cat-item { padding: 8px 18px; background: #1e293b; border-radius: 20px; margin-right: 10px; cursor: pointer; white-space: nowrap; font-size: 12px; }
        .cat-item.active { background: #3b82f6; }

        .grid { display: flex; flex-wrap: wrap; padding: 10px; }
        .ch-item { width: 30%; max-width: 100px; margin: 1.5%; text-align: center; cursor: pointer; }
        .ch-img { width: 70px; height: 70px; background: #111; border-radius: 15px; object-fit: cover; border: 1px solid #222; }
        .ch-txt { font-size: 10px; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="player-box">
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="section-title">সরাসরি ইভেন্ট</div>
<div id="eventBox" class="event-wrapper"></div>

<div class="controls">
    <input type="text" id="search" placeholder="চ্যানেল খুঁজুন..." onkeyup="doSearch()">
    <div id="catBar" class="cat-bar">
        <div class="cat-item active" onclick="filterByCat('All')">All</div>
    </div>
</div>

<div id="mainBox" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const video = document.getElementById('video');
    const S_URL = 'https://loaobuffipniwswylxyd.supabase.co';
    const S_KEY = 'sb_publishable_Y3LZPx7OkeJfztuTq4XkOg_WGDnvKlc';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let hls = new Hls();
    let masterData = [];

    // ভিডিও প্লে করার ফাংশন (CORS Proxy সহ)
    function playNow(url) {
        // গিটহাবের এরর ফিক্স করার জন্য প্রক্সি ব্যবহার করা হচ্ছে
        const finalUrl = "https://corsproxy.io/?" + encodeURIComponent(url);

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
            
            // নেটওয়ার্ক এরর হ্যান্ডেলিং
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.log("Network error, retrying with direct link...");
                            hls.loadSource(url); // প্রক্সি ছাড়া চেষ্টা
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = finalUrl;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function init() {
        const { data } = await _supabase.from('strm_vault_data').select('*');
        masterData = data || [];
        renderUI(masterData);
        setupCats(masterData);
    }

    function renderUI(data) {
        const eBox = document.getElementById('eventBox');
        const mBox = document.getElementById('mainBox');
        eBox.innerHTML = ''; mBox.innerHTML = '';

        data.forEach(item => {
            if(item.sv_is_event) {
                const e = document.createElement('div');
                e.className = 'event-card';
                e.style.backgroundImage = `url('${item.sv_logo || 'https://via.placeholder.com/200x120?text=Live'}')`;
                e.innerHTML = `<span>${item.sv_title}</span>`;
                e.onclick = () => playNow(item.sv_link);
                eBox.appendChild(e);
            }

            const c = document.createElement('div');
            c.className = 'ch-item';
            c.innerHTML = `
                <img src="${item.sv_logo || 'https://via.placeholder.com/70'}" class="ch-img">
                <div class="ch-txt">${item.sv_title}</div>
            `;
            c.onclick = () => playNow(item.sv_link);
            mBox.appendChild(c);
        });
    }

    function setupCats(data) {
        const bar = document.getElementById('catBar');
        const cats = ['All', ...new Set(data.map(i => i.sv_category))];
        bar.innerHTML = '';
        cats.forEach(c => {
            const d = document.createElement('div');
            d.className = 'cat-item';
            d.innerText = c;
            d.onclick = () => filterByCat(c);
            bar.appendChild(d);
        });
    }

    function filterByCat(c) {
        const filtered = (c === 'All') ? masterData : masterData.filter(i => i.sv_category === c);
        renderUI(filtered);
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = masterData.filter(i => i.sv_title.toLowerCase().includes(q));
        renderUI(filtered);
    }

    init();
</script>
</body>
</html>
